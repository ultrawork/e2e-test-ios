build:
  maxIssues: 0

style:
  MagicNumber:
    active: true
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
  MaxLineLength:
    active: true
    maxLineLength: 120
  WildcardImport:
    active: false
  ReturnCount:
    active: true
    max: 3
  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'

complexity:
  LongMethod:
    active: true
    threshold: 60
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 15
    thresholdInObjects: 15
    thresholdInEnums: 15
  ComplexCondition:
    active: true
    threshold: 4

naming:
  FunctionNaming:
    active: true
    excludes:
      - '**/ui/**'
      - '**/theme/**'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9]*'

empty-blocks:
  EmptyFunctionBlock:
    active: false
