name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: xcodebuild -project NotesApp/NotesApp.xcodeproj -scheme NotesApp -destination 'platform=iOS Simulator,name=iPhone 16' build
